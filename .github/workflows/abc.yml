name: Linting

on: push

jobs: 
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with: 
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npx eslint

      - name: Run tests
        run: npm run test

      - name: Build project
        run: npm run build

  deploy-app:
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: deploy
        run: echo "deploying"